<script type="text/javascript">
(function() {
    var arrows = [
        { type: "gf-arrow-up",    icon: "font-awesome/fa-arrow-up"    },
        { type: "gf-arrow-down",  icon: "font-awesome/fa-arrow-down"  },
        { type: "gf-arrow-left",  icon: "font-awesome/fa-arrow-left"  },
        { type: "gf-arrow-right", icon: "font-awesome/fa-arrow-right" }
    ];
    arrows.forEach(function(a) {
        RED.nodes.registerType(a.type, {
            category:  "GhostForge",
            color:     "#000",
            showLabel: false,
            defaults:  { name: { value: "" } },
            inputs:    1,
            outputs:   1,
            icon:      a.icon,
            label:     function() { return " "; },
            labelStyle: function() { return ""; }
        });
    });
})();
</script>
